name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Check + Test + Build all platforms
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: |
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-unknown-linux-musl
            x86_64-unknown-linux-musl
            x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Install zig
        run: brew install zig

      - name: Install cargo-zigbuild
        run: pip install cargo-zigbuild

      - name: Install cargo-xwin
        run: pip install cargo-xwin

      - name: Install LLVM (provides llvm-lib and lld-link for cargo-xwin)
        run: brew install llvm

      - name: Add LLVM to PATH
        run: echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Build all platforms
        run: ./build.sh

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qE '^v[0-9]+(\.[0-9]+)*-(alpha|beta|rc|pre|dev)\.'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Build release notes
        env:
          IS_PRERELEASE: ${{ steps.prerelease.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --list 'v*' --sort=-v:refname | grep -vx "$TAG" | head -n 1 || true)"

          {
            if [ "$IS_PRERELEASE" = "true" ]; then
              echo "⚠️ **This is a pre-release build. Expect bugs and breaking changes.**"
              echo
            fi

            if [ -n "$PREVIOUS_TAG" ]; then
              echo "## Changes since \`$PREVIOUS_TAG\`"
              echo
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${TAG}" |
                sed -E 's/ \[model:[^]]+\]//g'
              echo
              echo
              echo "Compare: https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG}"
            else
              echo "## Initial release"
              echo
              git log --pretty=format:'- %s (%h)' "$TAG" |
                sed -E 's/ \[model:[^]]+\]//g'
            fi

            echo
            echo "## Downloads"
            echo
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x86_64 | \`talos-x86_64-unknown-linux-musl.tar.gz\` |"
            echo "| Linux | ARM64 | \`talos-aarch64-unknown-linux-musl.tar.gz\` |"
            echo "| macOS | Apple Silicon | \`talos-aarch64-apple-darwin.tar.gz\` |"
            echo "| macOS | Intel | \`talos-x86_64-apple-darwin.tar.gz\` |"
            echo "| Windows | x86_64 | \`talos-x86_64-pc-windows-msvc.zip\` |"
            echo
            echo "Checksums: [\`checksum.sha256\`](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/checksum.sha256)"
            echo
            echo "### Install"
            echo
            echo '```bash'
            echo "# macOS / Linux"
            echo "curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/install.sh | sh"
            echo
            echo '# Windows (PowerShell)'
            echo "irm https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/install.ps1 | iex"
            echo '```'
            echo
            echo "Each archive contains a single \`talos\` (or \`talos.exe\`) binary."
          } > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          body_path: RELEASE_BODY.md
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: dist/*
