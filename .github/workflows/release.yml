name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Check + Test + Build all platforms
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: |
            aarch64-apple-darwin
            x86_64-apple-darwin
            aarch64-unknown-linux-musl
            x86_64-unknown-linux-musl
            x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Install zig
        run: brew install zig

      - name: Install cargo-zigbuild
        run: pip install cargo-zigbuild

      - name: Install cargo-xwin
        run: pip install cargo-xwin

      - name: Install LLVM (provides llvm-lib and lld-link for cargo-xwin)
        run: brew install llvm

      - name: Add LLVM to PATH
        run: echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Build all platforms
        run: ./build.sh

      - name: Detect pre-release
        id: prerelease
        run: |
          TAG="${GITHUB_REF_NAME}"
          if echo "$TAG" | grep -qE '^v[0-9]+(\.[0-9]+)*-(alpha|beta|rc|pre|dev)\.'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Build release notes
        env:
          IS_PRERELEASE: ${{ steps.prerelease.outputs.is_prerelease }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --list 'v*' --sort=-v:refname | grep -vx "$TAG" | head -n 1 || true)"
          RELEASE_URL_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          RAW_URL_BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${TAG}"
          TAG_URL_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/tag"
          COMMIT_URL_BASE="https://github.com/${GITHUB_REPOSITORY}/commit"

          format_commits() {
            git log --pretty=format:'%s%x09%h%x09%H' "$@" |
              sed -E 's/ \[model:[^]]+\]//g' |
              while IFS="$(printf '\t')" read -r subject short_hash full_hash || [ -n "$subject" ]; do
                [ -n "$subject" ] || continue
                echo "- ${subject} ([${short_hash}](${COMMIT_URL_BASE}/${full_hash}))"
              done
          }

          {
            if [ "$IS_PRERELEASE" = "true" ]; then
              echo "⚠️ **This is a pre-release build. Expect bugs and breaking changes.**"
              echo
            fi

            if [ -n "$PREVIOUS_TAG" ]; then
              echo "## Changes since [\`$PREVIOUS_TAG\`](${TAG_URL_BASE}/${PREVIOUS_TAG})"
              echo
              format_commits "${PREVIOUS_TAG}..${TAG}"
              echo
              echo
              echo "Compare: [\`${PREVIOUS_TAG}...${TAG}\`](https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG})"
            else
              echo "## Initial release"
              echo
              format_commits "$TAG"
            fi

            echo
            echo "## Downloads"
            echo
            echo "| Platform | Architecture | File |"
            echo "|----------|-------------|------|"
            echo "| Linux | x86_64 | [\`talos-x86_64-linux.tar.gz\`](${RELEASE_URL_BASE}/talos-x86_64-linux.tar.gz) |"
            echo "| Linux | ARM64 | [\`talos-aarch64-linux.tar.gz\`](${RELEASE_URL_BASE}/talos-aarch64-linux.tar.gz) |"
            echo "| macOS | Apple Silicon | [\`talos-aarch64-darwin.tar.gz\`](${RELEASE_URL_BASE}/talos-aarch64-darwin.tar.gz) |"
            echo "| macOS | Intel | [\`talos-x86_64-darwin.tar.gz\`](${RELEASE_URL_BASE}/talos-x86_64-darwin.tar.gz) |"
            echo "| Windows | x86_64 | [\`talos-x86_64-windows.zip\`](${RELEASE_URL_BASE}/talos-x86_64-windows.zip) |"
            echo
            echo "Checksums: [\`checksum.sha256\`](${RELEASE_URL_BASE}/checksum.sha256)"
            echo
            echo "### Install"
            echo
            echo '```bash'
            echo "# macOS / Linux"
            echo "curl -fsSL ${RAW_URL_BASE}/install/install.sh | sh"
            echo
            echo '# Windows (PowerShell)'
            echo "irm ${RAW_URL_BASE}/install/install.ps1 | iex"
            echo '```'
            echo
            echo "Installer scripts are published under \`install/\`. The old \`scripts/install.*\` paths are not kept after the pre-1.0 installer layout cleanup."
            echo
            echo "Each archive contains a single \`talos\` (or \`talos.exe\`) binary."
          } > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          body_path: RELEASE_BODY.md
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: dist/*
