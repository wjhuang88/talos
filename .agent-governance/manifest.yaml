risk_gates:
  - signal: "Sandbox escapes can lead to arbitrary code execution on host"
    gate: "All sandbox-related code requires security review before merge"
    owner: "docs/sop/NEW-FEATURE.md"
  - signal: "LLM provider credentials stored in config"
    gate: "Config files must support env var substitution; never hardcode secrets"
    owner: "AGENTS.md"
  - signal: "Tool execution can modify/delete user files"
    gate: "Permission system must be implemented before any write-capable tool"
    owner: "docs/sop/CHANGE-CONTROL.md"
  - signal: "Agent loop can enter infinite tool-call cycles"
    gate: "Turn budget and doom-loop detection required in agent loop"
    owner: "docs/sop/TESTING.md"
  - signal: "Multi-crate workspace with public APIs"
    gate: "Breaking API changes require ADR before implementation"
    owner: "docs/decisions/"

