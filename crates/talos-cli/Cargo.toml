[package]
name = "talos-cli"
description = "Primary command-line interface"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[[bin]]
name = "talos"
path = "src/main.rs"

[dependencies]
talos-core = { path = "../talos-core" }
talos-config = { path = "../talos-config" }
talos-provider = { path = "../talos-provider" }
talos-agent = { path = "../talos-agent" }
talos-tools = { path = "../talos-tools" }
talos-session = { path = "../talos-session" }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full", "signal"] }
anyhow = "1"
ctrlc = { version = "3", features = ["termination"] }
tokio-util = "0.7"

[lints]
workspace = true
